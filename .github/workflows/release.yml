name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  BINARY_NAME: rgrank
  CARGO_MANIFEST_PATH: rgrank/Cargo.toml

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            archive_ext: zip
            binary_path: rgrank/target/i686-pc-windows-msvc/release/rgrank.exe
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_path: rgrank/target/x86_64-unknown-linux-gnu/release/rgrank
          - label: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_path: rgrank/target/aarch64-unknown-linux-gnu/release/rgrank
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_path: rgrank/target/aarch64-apple-darwin/release/rgrank

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rgrank -> target

      - name: Build release binary
        run: cargo build --manifest-path "${{ env.CARGO_MANIFEST_PATH }}" --release --target "${{ matrix.target }}"

      - name: Package release archive on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARCHIVE_NAME: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.label }}.${{ matrix.archive_ext }}
        run: |
          New-Item -ItemType Directory -Force package | Out-Null
          Copy-Item "${{ matrix.binary_path }}" "package/${{ env.BINARY_NAME }}.exe"
          if (Test-Path "README.md") {
            Copy-Item "README.md" "package/README.md"
          }
          Compress-Archive -Path package/* -DestinationPath $env:ARCHIVE_NAME -Force

      - name: Package release archive on Unix
        if: runner.os != 'Windows'
        env:
          ARCHIVE_NAME: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.label }}.${{ matrix.archive_ext }}
        run: |
          mkdir -p package
          cp "${{ matrix.binary_path }}" "package/${{ env.BINARY_NAME }}"
          if [ -f README.md ]; then
            cp README.md package/README.md
          fi
          tar -C package -czf "${ARCHIVE_NAME}" .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.label }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.label }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-artifacts
        run: sha256sum * > SHA256SUMS.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
          generate_release_notes: true
